name: Lint and Test

on:
  push:
    branches:
    - main
    - master
    - feature/**
    - release/**
  pull_request:
    branches:
    - main
    - master
    - feature/**
    - release/**
    types: [opened, reopened, synchronize]
  merge_group:
  release:
    types: [edited, published]
  workflow_dispatch:

defaults:
  run:
    shell: bash -l {0}

jobs:

  lint:
    name: Lint (Python ${{ matrix.python-version }} on ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ['3.10']

    steps:
    - name: Checkout project
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0   # v7.0.0

    - name: Setup Miniconda
      uses: conda-incubator/setup-miniconda@8ee1f361103df19b6f8c8655fd3967a8ecb162d5   # v4.0.1
      with:
        auto-update-conda: true
        python-version: ${{ matrix.python-version }}
        miniconda-version: latest

    - name: Install latest conda
      run: |
        conda update -n base -q conda

    - name: Install dependencies
      run: |
        conda install -c defaults -c anaconda-cloud python=${{ matrix.python-version }} pip --file requirements.txt --file requirements-extra.txt
        pip install -r requirements-dev.txt
        pip install -e . --no-deps

    - name: Conda environment information
      run: |
        conda info
        conda config --show
        conda list --show-channel-urls

    - name: Check with bandit
      run: |
        make lint-bandit

    - name: Check with mypy
      run: |
        make lint-mypy

  test:
    name: Test (Python ${{ matrix.python-version }} on ${{ matrix.os }})
    needs: [lint]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
        python-version: ['3.10', '3.11', '3.12', '3.13', '3.14']

    steps:
    - name: Checkout project
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0   # v7.0.0

    - name: Setup Miniconda
      uses: conda-incubator/setup-miniconda@8ee1f361103df19b6f8c8655fd3967a8ecb162d5   # v4.0.1
      with:
        auto-update-conda: true
        python-version: ${{ matrix.python-version }}
        miniconda-version: latest

    - name: Install latest conda
      run: |
        conda update -n base -q conda

    - name: Install dependencies
      run: |
        conda install -c defaults -c anaconda-cloud python=${{ matrix.python-version }} pip --file requirements.txt --file requirements-extra.txt
        pip install -r requirements-dev.txt
        pip install -e . --no-deps

    - name: Conda environment information
      run: |
        conda info
        conda config --show
        conda list --show-channel-urls

    - name: Run tests
      env:
        _TYPER_FORCE_DISABLE_TERMINAL: 1
      run: |
        mkdir -p .artifacts/reports
        python scripts/refresh_coveragerc.py
        python -X utf8 -m pytest tests/ --cov-report html:.artifacts/reports/coverage --html=.artifacts/reports/pytest.html --self-contained-html

    - name: Export reports
      if: ${{ always() }}
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a   # v7.0.1
      with:
        name: report-test-${{ matrix.python-version }}-${{ matrix.os }}
        path: .artifacts/reports
        retention-days: 7
